<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Bootstrap demo</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
        <style>
            body {
                background-image: url(capa.png);
            }
            .nav-link {
                padding-top: 0;
                padding-bottom: 0;
                margin: 0 10px;
            }
            .navbar-brand {
                margin: 16px 0;
                padding: 0 5px;
            }
            #a1:hover, #a2:hover, #a3:hover, #a4:hover, #a5:hover {
                color: #00FF42;
            }
            .link {
                text-decoration: none;
                text-transform: uppercase;
                color: #1E84CA;
                background-color: #1ED760;
                padding: 14px 32px;
            }
            h1 {
                color: #1ED760;
            }
            p {
                color: #1ED760;
            }
        </style>
    </head>
    <body>
        <header>
            <nav class="navbar navbar-expand-md fixed-top navbar-dark bg-dark">
                <div class="container">
                    <svg xmlns="http://www.w3.org/2000/svg" style="color: white;" width="40" height="40" fill="currentColor" class="bi bi-spotify" viewBox="0 0 16 16">
                        <path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0zm3.669 11.538a.498.498 0 0 1-.686.165c-1.879-1.147-4.243-1.407-7.028-.77a.499.499 0 0 1-.222-.973c3.048-.696 5.662-.397 7.77.892a.5.5 0 0 1 .166.686zm.979-2.178a.624.624 0 0 1-.858.205c-2.15-1.321-5.428-1.704-7.972-.932a.625.625 0 0 1-.362-1.194c2.905-.881 6.517-.454 8.986 1.063a.624.624 0 0 1 .206.858zm.084-2.268C10.154 5.56 5.9 5.419 3.438 6.166a.748.748 0 1 1-.434-1.432c2.825-.857 7.523-.692 10.492 1.07a.747.747 0 1 1-.764 1.288z"/>
                    </svg>
                    <a class="navbar-brand" style="font-size: 25px;" href="#">Spotify</a>
                    
                    <button class="navbar-toggler">
                        <span class="navbar-toggler-icon" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item ms-2">
                                <a class="nav-link active" id="a1" href="#">Premium</a>
                            </li>
                            <li class="nav-item ms-2">
                                <a class="nav-link active" id="a2" href="#">Suporte</a>
                            </li>
                            <li class="nav-item ms-2">
                                <a class="nav-link active" id="a3" href="#">Baixar</a>
                            </li>
                            <li class="nav-item ms-2 border-start">
                                <a class="nav-link active" id="a4" href="#">Inscrever-se</a>
                            </li>
                            <li class="nav-item ms-2">
                                <a class="nav-link active" id="a5" href="#">Entrar</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <section>
            <div class="row">
                <div class="d-flex col-md-6 m-auto">
                    <div class="align-self-center">
                        <h1>Escutar muda tudo</h1>
                        <p class="mb-auto">Milhões de músicas e podcasts para explorar. E nem precisa de cartão de crédito.</p>
                        <a class="rounded-pill link" href="#">baixar o spotify free</a> 
                    </div>
                </div>
            </div>
        </section>




        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2" crossorigin="anonymous"></script>
    </body>
</html>
